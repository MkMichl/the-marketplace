<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | The Marketplace</title>
  <meta name="description" content="Admin login for The Marketplace management dashboard." />
  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #F8FAFC;
      --surface-2: #E2E8F0;
      --primary: #0F766E;
      --primary-hover: #14B8A6;
      --primary-soft: rgba(20, 184, 166, 0.12);
      --accent: #F59E0B;
      --accent-hover: #FBBF24;
      --text: #1F2937;
      --text-muted: #64748B;
      --muted: var(--text-muted);
      --border: #E2E8F0;
      --shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
      --danger: #EF4444;
      --danger-hover: #DC2626;
    }

    html[data-theme="dark"] {
      --bg: #0F172A;
      --surface: #1E293B;
      --surface-2: #334155;
      --primary: #14B8A6;
      --primary-hover: #2DD4BF;
      --primary-soft: rgba(20, 184, 166, 0.12);
      --accent: #F59E0B;
      --accent-hover: #FBBF24;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --muted: var(--text-muted);
      --border: #475569;
      --shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
      --danger: #EF4444;
      --danger-hover: #DC2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      padding: 22px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-weight: 800;
      font-size: 1.25rem;
    }

    .logo-admin {
      color: var(--danger);
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 8px;
      padding: 2px 8px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 4px;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      font-weight: 500;
    }

    .nav-links a:nth-last-child(-n+2) {
      font-size: 0.95rem;
      padding: 4px 4px;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      background: var(--surface);
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .admin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px;
      box-shadow: var(--shadow);
      max-width: 420px;
      width: 100%;
    }

    .admin-badge {
      display: inline-block;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .admin-card h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .admin-card p {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .admin-card label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }

    .admin-card input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .admin-card input:focus {
      border-color: var(--primary);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .admin-card button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .admin-card button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .admin-card button:active {
      transform: translateY(0);
    }

    .error-message {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .security-note {
      background: var(--primary-soft);
      border-left: 4px solid var(--primary);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 24px;
      color: var(--text);
    }

    @media (max-width: 480px) {
      body {
        overflow-x: hidden;
      }

      header {
        padding: 18px 20px;
      }

      .login-container {
        padding: 20px;
      }

      .admin-card {
        padding: 28px 20px;
      }

      .admin-card h1 {
        font-size: 1.6rem;
      }

      .nav-links {
        flex-direction: column;
        align-items: flex-start;
      }

      .checkbox-group {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">The Marketplace <span class="logo-admin">ADMIN</span></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="sign-in.html">User Login</a>
    </nav>
    <button class="theme-toggle" type="button">🌙 Dark</button>
  </header>

  <main class="login-container">
    <div class="admin-card">
      <div class="admin-badge">🔐 Admin Portal</div>
      <h1>Admin Login</h1>
      <p>Access the administrative dashboard to manage the marketplace.</p>

      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-email">Admin Email or Phone</label>
          <input
            type="text"
            id="admin-email"
            name="email"
            placeholder="admin@marketplace.com or (123) 456-7890"
            required
          />
          <div class="error-message" id="email-error"></div>
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <input
            type="password"
            id="admin-password"
            name="password"
            placeholder="••••••••"
            required
          />
          <div class="error-message" id="password-error"></div>
        </div>

        <div class="form-group">
          <label for="admin-code">2-Factor Code (Optional)</label>
          <input
            type="text"
            id="admin-code"
            name="code"
            placeholder="6-digit code"
            maxlength="6"
          />
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="remember-admin" name="remember" />
          <label for="remember-admin">Remember this device</label>
        </div>

        <button type="submit">Sign In to Admin Panel</button>

        <div class="security-note">
          ℹ️ This is a restricted area. All login attempts are logged and monitored for security purposes.
        </div>
      </form>
    </div>
  </main>

  <script>
    // Theme toggle
    const themeToggle = document.querySelector('.theme-toggle');
    const html = document.documentElement;

    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      html.setAttribute('data-theme', 'dark');
      themeToggle.textContent = '☀️ Light';
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeToggle.textContent = newTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
    });

    // Form handling
    const loginForm = document.getElementById('admin-login-form');
    const adminEmail = document.getElementById('admin-email');
    const adminPassword = document.getElementById('admin-password');

    // Helper function to validate email
    const isValidEmail = (email) => {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    };

    // Helper function to validate phone number
    const isValidPhone = (phone) => {
      return /^[\d\s\-\(\)\+]{10,}$/.test(phone.replace(/\s/g, '')) && /\d/.test(phone);
    };

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      // Clear previous errors
      document.getElementById('email-error').classList.remove('show');
      document.getElementById('password-error').classList.remove('show');

      let hasError = false;

      const input = adminEmail.value.trim();

      // Validate email or phone
      if (!isValidEmail(input) && !isValidPhone(input)) {
        document.getElementById('email-error').textContent = 'Please enter a valid email address or phone number';
        document.getElementById('email-error').classList.add('show');
        hasError = true;
      }

      // Validate password
      if (adminPassword.value.length < 8) {
        document.getElementById('password-error').textContent = 'Password must be at least 8 characters';
        document.getElementById('password-error').classList.add('show');
        hasError = true;
      }

      if (!hasError) {
        // In a real application, you would send credentials to a secure server
        // For demo purposes, we'll redirect to dashboard
        localStorage.setItem('admin-logged-in', 'true');
        localStorage.setItem('admin-email', input);
        window.location.href = 'admin-dashboard.html';
      }
    });

    // Remember device functionality
    const rememberCheckbox = document.getElementById('remember-admin');
    if (localStorage.getItem('admin-remember') === 'true') {
      rememberCheckbox.checked = true;
      if (localStorage.getItem('admin-email')) {
        adminEmail.value = localStorage.getItem('admin-email');
      }
    }

    rememberCheckbox.addEventListener('change', (e) => {
      if (e.target.checked) {
        localStorage.setItem('admin-remember', 'true');
        localStorage.setItem('admin-email', adminEmail.value);
      } else {
        localStorage.removeItem('admin-remember');
        localStorage.removeItem('admin-email');
      }
    });
  </script>
</body>
</html>
