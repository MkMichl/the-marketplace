<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Sign In | The Marketplace</title>
  <meta name="description" content="Sign in as a seller on The Marketplace." />
  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #F8FAFC;
      --surface-2: #E2E8F0;
      --primary: #0F766E;
      --primary-hover: #14B8A6;
      --primary-soft: rgba(20, 184, 166, 0.12);
      --accent: #F59E0B;
      --accent-hover: #FBBF24;
      --text: #1F2937;
      --text-muted: #64748B;
      --muted: var(--text-muted);
      --border: #E2E8F0;
      --shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
      --buyer: #3B82F6;
      --seller: #10B981;
    }

    html[data-theme="dark"] {
      --bg: #0F172A;
      --surface: #1E293B;
      --surface-2: #334155;
      --primary: #14B8A6;
      --primary-hover: #2DD4BF;
      --primary-soft: rgba(20, 184, 166, 0.12);
      --accent: #F59E0B;
      --accent-hover: #FBBF24;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --muted: var(--text-muted);
      --border: #475569;
      --shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
      --buyer: #3B82F6;
      --seller: #10B981;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      padding: 22px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-weight: 800;
      font-size: 1.25rem;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      font-weight: 500;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      background: var(--surface);
    }

    .login-container {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px;
      box-shadow: var(--shadow);
      max-width: 420px;
      width: 100%;
    }

    .auth-badge {
      display: inline-block;
      background: rgba(16, 185, 129, 0.1);
      color: var(--seller);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .auth-card h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .auth-card p {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .auth-card label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }

    .auth-card input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .auth-card input:focus {
      border-color: var(--primary);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .auth-card button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--seller);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .auth-card button:hover {
      background: #059669;
      transform: translateY(-2px);
    }

    .auth-card button:active {
      transform: translateY(0);
    }

    .error-message {
      color: #EF4444;
      font-size: 0.9rem;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .back-button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 16px;
      width: 100%;
      transition: background 0.2s ease;
    }

    .back-button:hover {
      background: var(--surface-2);
    }

    .bottom-links {
      margin-top: 24px;
      text-align: center;
    }

    .bottom-links a {
      color: var(--primary);
      font-weight: 600;
    }

    @media (max-width: 480px) {
      body {
        overflow-x: hidden;
      }

      header {
        padding: 18px 20px;
      }

      .login-container {
        padding: 20px;
      }

      .auth-card {
        padding: 28px 20px;
      }

      .auth-card h1 {
        font-size: 1.6rem;
      }

      .nav-links {
        flex-direction: column;
        align-items: flex-start;
      }

      .checkbox-group {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">The Marketplace</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="buyer-signin.html">Buyer Login</a>
      <a href="admin-login.html">Admin</a>
    </nav>
    <button class="theme-toggle" type="button">🌙 Dark</button>
  </header>

  <main class="login-container">
    <div class="auth-card">
      <div class="auth-badge">📦 Seller Portal</div>
      <h1>Seller Login</h1>
      <p>Manage your listings, inventory, and sales.</p>

      <form id="seller-signin-form">
        <div class="form-group">
          <label for="seller-email">Email or Phone Number</label>
          <input
            type="text"
            id="seller-email"
            name="email"
            placeholder="seller@example.com or (123) 456-7890"
            required
          />
          <div class="error-message" id="email-error"></div>
        </div>

        <div class="form-group">
          <label for="seller-password">Password</label>
          <input
            type="password"
            id="seller-password"
            name="password"
            placeholder="••••••••"
            required
          />
          <div class="error-message" id="password-error"></div>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="seller-remember" name="remember" />
          <label for="seller-remember">Remember me</label>
        </div>

        <button type="submit">Sign In as Seller</button>

        <a href="buyer-signin.html" class="back-button">🛍️ Switch to Buyer Login</a>

        <div class="bottom-links">
          <p>Don't have a seller account? <a href="register.html">Create one</a></p>
        </div>
      </form>
    </div>
  </main>

  <script>
    // Theme toggle
    const themeToggle = document.querySelector('.theme-toggle');
    const html = document.documentElement;

    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      html.setAttribute('data-theme', 'dark');
      themeToggle.textContent = '☀️ Light';
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeToggle.textContent = newTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
    });

    // Helper functions
    const isValidEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    const isValidPhone = (phone) => /^[\d\s\-\(\)\+]{10,}$/.test(phone.replace(/\s/g, '')) && /\d/.test(phone);

    // Form submission
    document.getElementById('seller-signin-form').addEventListener('submit', (e) => {
      e.preventDefault();

      document.getElementById('email-error').classList.remove('show');
      document.getElementById('password-error').classList.remove('show');

      const email = document.getElementById('seller-email').value.trim();
      const password = document.getElementById('seller-password').value.trim();

      let hasError = false;

      if (!isValidEmail(email) && !isValidPhone(email)) {
        document.getElementById('email-error').textContent = 'Please enter a valid email or phone number';
        document.getElementById('email-error').classList.add('show');
        hasError = true;
      }

      if (password.length < 6) {
        document.getElementById('password-error').textContent = 'Password must be at least 6 characters';
        document.getElementById('password-error').classList.add('show');
        hasError = true;
      }

      if (!hasError) {
        localStorage.setItem('user-logged-in', 'true');
        localStorage.setItem('user-role', 'seller');
        localStorage.setItem('user-email', email);
        const userName = isValidEmail(email) 
          ? email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1)
          : 'Seller';
        localStorage.setItem('user-name', userName);

        window.location.href = 'seller-dashboard.html';
      }
    });
  </script>
</body>
</html>
